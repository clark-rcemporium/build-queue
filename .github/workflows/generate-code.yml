name: Dual-Agent Build Pipeline - Code Generation

on:
  push:
    paths:
      - 'requests/*.json'
    branches:
      - main

jobs:
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai

      - name: Process Build Requests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: node .github/scripts/process_requests.js

      - name: Commit and push generated code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add builds/ requests/
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-generate build from request [skip ci]"
            git push
            echo "Generated code committed and pushed successfully."
          else
            echo "No changes to commit."
          fi
